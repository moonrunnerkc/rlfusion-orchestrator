<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="RLFusion Orchestrator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06060a"/>
      <stop offset="1" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#22d3ee" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- left: title block -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#e4e4e7">
    <text x="56" y="120" font-size="56" font-weight="700" fill="#22d3ee" filter="url(#glow)">RLFusion</text>
    <text x="56" y="172" font-size="36" font-weight="500" fill="#e4e4e7">Orchestrator</text>
    <text x="56" y="220" font-size="16" fill="#a1a1aa">Local-first RAG.</text>
    <text x="56" y="242" font-size="16" fill="#a1a1aa">An RL policy picks per-query weights</text>
    <text x="56" y="264" font-size="16" fill="#a1a1aa">between a cache and a knowledge graph.</text>
  </g>

  <!-- right: minimal pipeline diagram -->
  <g transform="translate(700,80)">
    <!-- source: CAG -->
    <g>
      <circle cx="60" cy="40" r="34" fill="#0e1117" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="60" y="46" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#22d3ee">CAG</text>
      <text x="60" y="100" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">cache</text>
    </g>
    <!-- source: Graph -->
    <g>
      <circle cx="60" cy="160" r="34" fill="#0e1117" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="60" y="166" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#22d3ee">Graph</text>
      <text x="60" y="220" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">entities + chunks</text>
    </g>

    <!-- edges into fusion -->
    <path d="M 94 40 Q 180 60 220 100" fill="none" stroke="url(#edge)" stroke-width="2"/>
    <path d="M 94 160 Q 180 140 220 100" fill="none" stroke="url(#edge)" stroke-width="2"/>

    <!-- fusion node -->
    <g>
      <rect x="220" y="72" width="120" height="56" rx="8" fill="#0e1117" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="280" y="96" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#22d3ee">Fusion</text>
      <text x="280" y="116" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#a1a1aa">CQL policy</text>
    </g>

    <!-- edge fusion -> generation -->
    <path d="M 340 100 L 410 100" fill="none" stroke="url(#edge)" stroke-width="2"/>
    <polygon points="404,94 416,100 404,106" fill="#22d3ee" opacity="0.8"/>

    <!-- generation node -->
    <g>
      <rect x="416" y="72" width="60" height="56" rx="8" fill="#0e1117" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="446" y="96" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#22d3ee">LLM</text>
      <text x="446" y="113" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#a1a1aa">8B</text>
    </g>

    <!-- critique loop -->
    <path d="M 446 128 Q 446 200 280 200 Q 130 200 60 200" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
    <text x="260" y="220" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">critique → reward → replay buffer</text>
  </g>

  <!-- footer rule -->
  <line x1="56" y1="290" x2="1144" y2="290" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="1"/>
  <text x="56" y="304" font-family="ui-monospace, monospace" font-size="11" fill="#52525b">offline CQL · llama-cpp-python · networkx · sqlite · no cloud</text>
</svg>
